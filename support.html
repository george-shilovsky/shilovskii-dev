<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Support — shilovskii.dev</title>
<meta name="description" content="Support — redirects to the contact form for app help.">
<meta name="robots" content="noindex">
<meta http-equiv="refresh" content="0; url=contact.html?topic=support">
<link rel="canonical" href="https://shilovskii.dev/contact.html?topic=support">
<script>
  // Preserve any extra query params (e.g. ?app=migaja&v=1.2) when forwarding.
  (function () {
    var search = window.location.search || '';
    var extra = '';
    if (search) {
      var params = new URLSearchParams(search);
      params.delete('topic'); // avoid duplicating
      var rest = params.toString();
      if (rest) extra = '&' + rest;
    }
    window.location.replace('contact.html?topic=support' + extra);
  })();
</script>
<style>
  body { font-family: system-ui, -apple-system, sans-serif; padding: 48px; color: #555; }
  a { color: #c8392b; }
</style>
</head>
<body>
  <p>Redirecting to the contact form… If nothing happens, <a href="contact.html?topic=support">open it manually</a>.</p>
</body>
</html>
