<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Apps — shilovskii.dev</title>
<meta name="description" content="Independent, local-first software for Apple platforms. Each app runs entirely on the user's device — no servers, no telemetry, no compromises.">
<link rel="canonical" href="https://shilovskii.dev/apps.html">
<meta property="og:type" content="website">
<meta property="og:title" content="Apps — shilovskii.dev">
<meta property="og:description" content="Independent, local-first software for Apple platforms. Runs entirely on-device — no servers, no telemetry, no compromises.">
<meta property="og:url" content="https://shilovskii.dev/apps.html">
<link href="https://fonts.googleapis.com/css2?family=Inter+Tight:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="styles.css">
</head>
<body>
<div id="site-nav"></div>

<section style="padding: 64px 0 32px;">
  <div class="container-narrow">
    <div class="tag-mono" style="margin-bottom: 16px;">All apps · 3</div>
    <h1 style="font-size: 48px; line-height: 1.05; letter-spacing: -0.04em; font-weight: 600; margin-bottom: 20px;">Apps</h1>
    <p style="font-size: 18px; color: var(--fg-2); line-height: 1.55; max-width: 580px; text-wrap: pretty;">
      Independent, local-first software for Apple platforms. Each app runs entirely on the user's device — no servers, no telemetry, no compromises.
    </p>
  </div>
</section>

<section style="padding: 32px 0 48px;">
  <div class="container">
    <div id="apps-grid" style="display: grid; grid-template-columns: repeat(auto-fit, minmax(320px, 1fr)); gap: 16px;" class="apps-grid"></div>
  </div>
</section>

<div id="site-footer"></div>
<script src="shared.js"></script>
<script>
  SiteChrome.render({ active: 'apps' });
  document.getElementById('apps-grid').innerHTML = SiteChrome.APPS.map(app => `
    <a href="${SiteChrome.appHref(app.id)}" class="app-card">
      <div class="app-card-row">
        ${app.icon
          ? `<img src="${SiteChrome.BASE}${app.icon}" alt="${app.name} icon" style="width: 56px; height: 56px; border-radius: 14px; display: block; object-fit: cover;">`
          : `<div class="app-icon" style="width: 56px; height: 56px; border-radius: 14px; background: ${app.color}; font-size: 26px;">${app.glyph}</div>`}
        <div class="app-card-meta">
          <div class="app-card-name" style="font-size: 18px;">${app.name}</div>
          <div class="app-card-tag" style="margin-top: 4px;">${app.tag}</div>
        </div>
        <span style="color: var(--fg-3); font-size: 20px;">→</span>
      </div>
      <p class="app-card-summary">${app.summary}</p>
    </a>
  `).join('');
</script>
</body>
</html>
